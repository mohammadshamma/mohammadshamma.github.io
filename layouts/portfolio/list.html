{{- define "main" -}}
<div class="wrapper list-page">
    <header class="header">
        <h1 class="header-title center">{{ .Title }}</h1>
    </header>
    <main class="page-content" aria-label="Content">
        {{ with .Content }}
        <div class="portfolio-intro">{{ . }}</div>
        {{ end }}
        <div class="portfolio-grid">
            {{ range .Pages }}
            {{ partial "portfolio-card.html" . }}
            {{ end }}
        </div>
    </main>
</div>
{{- end -}}
