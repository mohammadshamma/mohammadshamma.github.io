baseURL = 'https://blog.negfeed.com/'
languageCode = 'en-us'
title = "Mohammad Shamma's Page"
theme = "hugo-blog-awesome"

[services]
  [services.googleAnalytics]
    id = 'G-RZ2LNRDTNZ' # GA4 Measurement ID

[params]
  goToTop = true
  mainSections = ['posts'] # keeps the portfolio out of the homepage "recent posts" list

[[menu.main]]
  name = 'Home'
  pageRef = '/'
  weight = 10

[[menu.main]]
  name = 'Portfolio'
  pageRef = '/portfolio'
  weight = 20

[params.author]
  avatar = "avatar.jpg" # put the file in assets folder; also ensure that image has same height and width
  # Note: image is not rendered if the resource(avatar image) is not found. No error is displayed.
  intro = "Mohammad Shamma's Page"
  name = "Mohammad Shamma"
  description = "I write about software."

[[params.socialIcons]]
name = "github"
url = "https://github.com/mohammadshamma"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/mohammadshamma/"
